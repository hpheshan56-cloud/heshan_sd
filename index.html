<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Paper Hub | Heshan SD</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.1);
            --accent-orange: #FF9900;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        }
        .profile-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--accent-orange);
            object-fit: cover;
            margin-bottom: 15px;
        }
        .logo { font-size: 35px; font-weight: 800; text-transform: uppercase; }
        .orange-box { background: var(--accent-orange); color: black; padding: 2px 10px; border-radius: 5px; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; flex: 1; }
        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px; 
            margin-bottom: 30px; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .subject { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 12px; 
        }
        .btn { 
            background: var(--accent-orange); 
            color: black; 
            text-decoration: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 14px; 
        }
        h2 { border-left: 6px solid var(--accent-orange); padding-left: 15px; margin-bottom: 25px; }
        footer { text-align: center; padding: 30px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>
    <header class="header">
        <img src="heshan.jpg" alt="Heshan SD" class="profile-photo">
        <div class="logo">PAST PAPER <span class="orange-box">HUB</span></div>
        <p style="color: #94a3b8; letter-spacing: 2px;">DOWNLOAD BY HESHAN SD</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>Commerce Stream</h2>
            <div class="grid">
                <div class="subject"><span>Business Studies</span><a href="https://govdoc.lk/category/past-papers/business-studies" target="_blank" class="btn">Get Paper</a></div>
                <div class="subject"><span>Accounting</span><a href="https://govdoc.lk/category/past-papers/accounting" target="_blank" class="btn">Get Paper</a></div>
                <div class="subject"><span>Economics</span><a href="https://govdoc.lk/category/past-papers/economics" target="_blank" class="btn">Get Paper</a></div>
                <div class="subject"><span>ICT</span><a href="https://govdoc.lk/page/gce-advanced-level-exam-information-and-communication-technology-ict-past-papers-sinhala" target="_blank" class="btn">Get Paper</a></div>
            </div>
        </div>

        <div class="card">
            <h2>Art Stream</h2>
            <div class="grid">
                <div class="subject"><span>Media Studies</span><a href="https://www.alevelapi.com/category/media-past-papers/" target="_blank" class="btn">Get Paper</a></div>
                <div class="subject"><span>Geography</span><a href="https://www.alevelapi.com/category/geography-past-papers/" target="_blank" class="btn">Get Paper</a></div>
                <div class="subject"><span>Sinhala</span><a href="https://govdoc.lk/category/past-papers/gce-advance-level-exam" target="_blank" class="btn">Get Paper</a></div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Crafted by Heshan S Dananjana | All Rights Reserved</footer>
</body>
</html>
